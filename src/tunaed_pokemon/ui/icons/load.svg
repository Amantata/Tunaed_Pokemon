<!-- load.svg — 열린 폴더와 위쪽 화살표 / Open folder with up-arrow for "불러오기" -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Folder back panel -->
  <path d="M4 16 L4 38 Q4 40 6 40 L42 40 Q44 40 44 38 L44 18 Q44 16 42 16 Z"
        fill="#0F3460" stroke="#34E5FF" stroke-width="1.8"/>
  <!-- Folder tab -->
  <path d="M4 16 L4 12 Q4 10 6 10 L18 10 L22 14 L44 14 L44 16 Z"
        fill="#0F3460" stroke="#34E5FF" stroke-width="1.8"/>
  <!-- Folder body highlight -->
  <path d="M4 20 L44 20" stroke="#34E5FF" stroke-width="1" opacity="0.3"/>

  <!-- Up arrow inside folder -->
  <line x1="24" y1="34" x2="24" y2="22" stroke="#FFE66D" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="17,28 24,21 31,28" stroke="#FFE66D" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
