<!-- terrain.svg — 「필드」 지형 효과 표시 / Diamond terrain marker for 「필드」(FE-04) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Diamond shape -->
  <polygon points="24,4 44,24 24,44 4,24"
           fill="#0F3460" stroke="#34E5FF" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Inner diamond -->
  <polygon points="24,12 36,24 24,36 12,24"
           fill="#16213E" stroke="#34E5FF" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Center dot -->
  <circle cx="24" cy="24" r="3.5" fill="#34E5FF"/>
  <!-- Corner accents -->
  <circle cx="24" cy="6"  r="2" fill="#34E5FF" opacity="0.6"/>
  <circle cx="24" cy="42" r="2" fill="#34E5FF" opacity="0.6"/>
  <circle cx="6"  cy="24" r="2" fill="#34E5FF" opacity="0.6"/>
  <circle cx="42" cy="24" r="2" fill="#34E5FF" opacity="0.6"/>
</svg>
