<!-- switch.svg — 포켓몬 교대 (양방향 화살표) / Swap arrows for Pokémon switch -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Top arrow: left to right -->
  <line x1="6" y1="18" x2="38" y2="18" stroke="#34E5FF" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="30,11 38,18 30,25" stroke="#34E5FF" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Bottom arrow: right to left -->
  <line x1="42" y1="30" x2="10" y2="30" stroke="#FFE66D" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="18,23 10,30 18,37" stroke="#FFE66D" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
