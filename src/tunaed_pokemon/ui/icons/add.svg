<!-- add.svg — 플러스 기호 (추가) / Plus sign for "추가" -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Circle background -->
  <circle cx="24" cy="24" r="18" fill="#0F3460" stroke="#34E5FF" stroke-width="2"/>
  <!-- Plus horizontal -->
  <line x1="14" y1="24" x2="34" y2="24" stroke="#34E5FF" stroke-width="3" stroke-linecap="round"/>
  <!-- Plus vertical -->
  <line x1="24" y1="14" x2="24" y2="34" stroke="#34E5FF" stroke-width="3" stroke-linecap="round"/>
</svg>
