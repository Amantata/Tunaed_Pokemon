<!-- editor.svg — 연필이 책 위에 / Pencil over an open book for "파티/도감 편집" -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Open book pages -->
  <path d="M6 10 Q6 8 8 8 L22 10 L22 38 L8 36 Q6 36 6 34 Z"
        fill="#0F3460" stroke="#34E5FF" stroke-width="1.8"/>
  <path d="M26 10 L40 8 Q42 8 42 10 L42 34 Q42 36 40 36 L26 38 Z"
        fill="#0F3460" stroke="#34E5FF" stroke-width="1.8"/>
  <!-- Spine -->
  <line x1="24" y1="10" x2="24" y2="38" stroke="#34E5FF" stroke-width="2"/>
  <!-- Lines on pages -->
  <line x1="10" y1="16" x2="20" y2="17" stroke="#34E5FF" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="10" y1="21" x2="20" y2="22" stroke="#34E5FF" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="10" y1="26" x2="20" y2="27" stroke="#34E5FF" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>

  <!-- Pencil body (overlaid, angled) -->
  <path d="M28 32 L38 8 L42 10 L32 36 Z" fill="#FFE66D" stroke="#FFE66D" stroke-width="0.5"/>
  <!-- Pencil tip -->
  <path d="M28 32 L30 38 L32 36 Z" fill="#E0E0E0"/>
  <!-- Pencil lead point -->
  <path d="M29.5 35 L30 38 L30.5 35.5" fill="#555" stroke="none"/>
  <!-- Pencil eraser band -->
  <line x1="38" y1="8" x2="42" y2="10" stroke="#F44336" stroke-width="3" stroke-linecap="round"/>
  <!-- Pencil highlight -->
  <line x1="29.5" y1="31" x2="39.5" y2="9" stroke="#fff" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
</svg>
