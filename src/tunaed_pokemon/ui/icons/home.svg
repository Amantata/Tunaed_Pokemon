<!-- home.svg — 홈으로 돌아가기 / Home/back for launcher return -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- House roof -->
  <polyline points="4,22 24,4 44,22" stroke="#34E5FF" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- House body -->
  <path d="M10 22 L10 42 Q10 44 12 44 L36 44 Q38 44 38 42 L38 22"
        fill="#0F3460" stroke="#34E5FF" stroke-width="2" stroke-linejoin="round"/>
  <!-- Door -->
  <rect x="19" y="30" width="10" height="14" rx="2"
        fill="#16213E" stroke="#34E5FF" stroke-width="1.5"/>
  <!-- Door handle -->
  <circle cx="27" cy="37" r="1.5" fill="#FFE66D"/>
  <!-- Chimney -->
  <rect x="30" y="10" width="5" height="10" rx="1"
        fill="#0F3460" stroke="#34E5FF" stroke-width="1.5"/>
</svg>
