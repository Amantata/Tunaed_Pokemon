<!-- weather.svg — 날씨 표시 (구름과 태양) / Cloud with sun rays for weather tags -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Sun (partially behind cloud) -->
  <circle cx="30" cy="18" r="8" fill="#FFE66D" opacity="0.9"/>
  <!-- Sun rays -->
  <line x1="30" y1="6"  x2="30" y2="4"  stroke="#FFE66D" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="10" x2="40" y2="8"  stroke="#FFE66D" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="18" x2="44" y2="18" stroke="#FFE66D" stroke-width="2" stroke-linecap="round"/>
  <!-- Cloud body -->
  <path d="M8 30 Q6 22 14 20 Q16 12 26 14 Q32 10 36 16 Q42 16 42 22 Q44 30 36 32 L12 32 Q6 32 8 30 Z"
        fill="#1e3a5f" stroke="#34E5FF" stroke-width="2"/>
</svg>
