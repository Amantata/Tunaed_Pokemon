<!-- delete.svg — 쓰레기통 (삭제) / Trash can for "삭제" -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Lid -->
  <path d="M10 14 L38 14" stroke="#F44336" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Lid handle -->
  <path d="M18 14 L18 10 Q18 8 20 8 L28 8 Q30 8 30 10 L30 14"
        stroke="#F44336" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Body -->
  <path d="M13 14 L15 40 Q15 42 17 42 L31 42 Q33 42 33 40 L35 14"
        fill="#0F3460" stroke="#F44336" stroke-width="2" stroke-linejoin="round"/>
  <!-- Delete lines inside -->
  <line x1="19" y1="20" x2="19" y2="36" stroke="#F44336" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="24" y1="20" x2="24" y2="36" stroke="#F44336" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="29" y1="20" x2="29" y2="36" stroke="#F44336" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
</svg>
