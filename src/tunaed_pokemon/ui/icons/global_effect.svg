<!-- global_effect.svg — 전체 필드 효과 (원과 선, 트릭룸 등) / Orbiting lines for global effects (FE-03) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Outer ring -->
  <circle cx="24" cy="24" r="18" stroke="#34E5FF" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Inner ring -->
  <circle cx="24" cy="24" r="10" stroke="#34E5FF" stroke-width="1.5" fill="none" opacity="0.7"/>
  <!-- Center -->
  <circle cx="24" cy="24" r="3" fill="#FFE66D"/>
  <!-- Cardinal orbit marks -->
  <line x1="24" y1="4"  x2="24" y2="8"  stroke="#34E5FF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="40" x2="24" y2="44" stroke="#34E5FF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="4"  y1="24" x2="8"  y2="24" stroke="#34E5FF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="24" x2="44" y2="24" stroke="#34E5FF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Orbit arc (dashed suggestion via short arcs) -->
  <path d="M38,14 A18,18 0 0,1 42,24" stroke="#FFE66D" stroke-width="2"
        stroke-linecap="round" fill="none" opacity="0.7"/>
</svg>
